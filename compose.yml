services:
  backend:
    build:
      context: ./
      dockerfile: ./docker/backend/Dockerfile
    volumes:
      - .:/workdir
    expose:
      - 9000
    tty: true
    restart: always
    depends_on:
      - db

  db:
    image: mysql:9
    volumes:
      - news_mysql_data:/var/lib/mysql
    env_file:
      - ./docker/db/.env # .env.sample置いといたから参考にして
    ports:
      - "3306:3306"
    restart: always

  web:
    image: nginx:latest
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./backend:/workdir/backend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: always

  voicevox:
    image: voicevox/voicevox_engine:cpu-latest
    ports:
      - "50021:50021"
    restart: always

  frontend:
    build:
      context: .
      dockerfile: ./docker/frontend/Dockerfile
    ports:
      - "3000:3000"
    restart: always
    volumes:
      - ./:/workdir
      - /workdir/frontend/node_modules

volumes:
  news_mysql_data: