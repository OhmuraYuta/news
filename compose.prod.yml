services:
  backend:
    build:
      context: ./
      dockerfile: ./docker/backend/Dockerfile
    volumes:
      - .:/workdir
    expose:
      - 9000
    tty: true
    restart: always
    depends_on:
      - db

  db:
    image: mysql:9
    volumes:
      - news_mysql_data:/var/lib/mysql
    env_file:
      - ./docker/db/.env # .env.sample置いといたから参考にして
    ports:
      - "3306:3306"
    restart: always

  web:
    image: nginx:latest
    volumes:
      - ./docker/nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf
      - ./backend:/workdir/backend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: always

  playwright:
    image: mcr.microsoft.com/playwright:v1.57.0-noble
    ports:
      - "3001:3001"
    working_dir: /home/pwuser
    user: pwuser
    command: /bin/sh -c "npx -y playwright@1.57.0 run-server --port 3001 --host 0.0.0.0"
    tty: true
    stdin_open: true

  api:
    build:
      context: .
      dockerfile: ./docker/api/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./:/workdir
      - /workdir/api/.venv
    env_file:
      - ./api/.env
    restart: always
    tty: true

  voicevox:
    image: voicevox/voicevox_engine:nvidia-latest
    ports:
      - "50021:50021"
    restart: always

  frontend:
    build:
      context: .
      dockerfile: ./docker/frontend/Dockerfile.prod
    ports:
      - "3000:3000"
    restart: always

  cloudflared:
    image: cloudflare/cloudflared:latest
    env_file:
      - ./docker/cloudflared/.env
    command: tunnel --no-autoupdate run
    restart: always

volumes:
  news_mysql_data:
